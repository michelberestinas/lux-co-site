<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Lux & Co. Consulting</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Inter:wght@400;500;600&family=Inter+Tight:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #0a1628; }
  body { font-family: 'Inter', system-ui, sans-serif; color: #ebe0c8; }
  * { box-sizing: border-box; }
  /* Splash while Babel/React boot — vanishes when SiteApp mounts */
  #boot-splash { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    background: #0a1628; z-index: 9999; transition: opacity .4s; }
  #boot-splash .mark { font-family: 'Cormorant Garamond', serif; font-size: 38px; color: #c9a961; letter-spacing: .01em; }
  #boot-splash .mark em { font-style: italic; }
  #boot-splash .tag { display: block; font-family: 'Inter', sans-serif; font-size: 9px; letter-spacing: .32em;
    color: #c9a961; text-transform: uppercase; margin-top: 8px; text-align: center; }
  body.booted #boot-splash { opacity: 0; pointer-events: none; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="boot-splash">
  <div>
    <div class="mark">Lux <em>&amp;</em> Co.</div>
    <span class="tag">Consulting</span>
  </div>
</div>
<div id="root"></div>
<script src="site-content.js"></script>
<script type="text/babel" src="site-app.jsx"></script>
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById("root")).render(
    <SiteApp variant="dark" initialLang="pt" />
  );
  requestAnimationFrame(() => document.body.classList.add("booted"));
</script>
</body>
</html>
